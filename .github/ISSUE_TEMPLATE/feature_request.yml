name: Feature Request
description: Suggest a new feature for archtracker-mcp
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP Server
        - Web Viewer
        - Analyzer
        - i18n
        - CI/CD
        - Other
    validations:
      required: true
